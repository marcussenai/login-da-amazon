<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Sign-In</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <a href="https://www.amazon.com.br/ref=ap_frn_logo">
                <img src="logos-e-fotos/amazonlogo.png" alt="logo-img">
                <h1 class="logo-texto">&nbsp.com.br</h1>
            </a>
        </div>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Faça login ou crie uma conta</h2>

            <label for="campo-login">Insira um número de celular ou um endereço de e-mail</label>
            <input type="email" name="login" id="campo-login">

            <button class="btn-continuar">Continuar</button>

            <p class="texto-termos">
                Ao continuar, você concorda com as <a href="#">Condições de Uso</a>
                e a <a href="#">Notificação de privacidade</a> da Amazon.
            </p>

            <div class="ajuda-container">
                <a href="#" class="link-ajuda">Precisa de ajuda?</a>
            </div>
        </div>
    </main>


    <footer>
        <a href="https://www.amazon.com.br/gp/help/customer/display.html/ref=ap_desktop_footer_cou?nodeId=GLSBYFE9MGKKQXXM&ie=UTF8&ref_=ap_desktop_footer_cou"
            target="_blank"> Condições de uso</a>
        <a href="https://www.amazon.com.br/gp/help/customer/display.html/ref=ap_desktop_footer_privacy_notice?nodeId=GX7NJQ4ZB8MHFRNJ&ie=UTF8&ref_=ap_desktop_footer_privacy_notice"
            target="_blank"> Notificação de privacidade </a>
        <a href="https://www.amazon.com.br/gp/help/customer/display.html?nodeId=508510" target="_blank"> Ajuda </a>
        <a href="https://www.amazon.com.br/gp/help/customer/display.html/?nodeId=GVASXV5UZ64R4Y25" target="_blank">
            Aviso de
            cookies </a>
        <a href="https://www.amazon.com.br/gp/help/customer/display.html?nodeId=GLVB9XDF9M8MU7UZ" target="_blank">
            Anúncios
            baseados em interesses </a>
        <div class="subtexto">© 1996-2026, Amazon.com, Inc. ou suas afiliadas</div>
    </footer>

</body>

</html>
